# Portal nginx: serve the static chat UI AND reverse-proxy the gateway.
#
# Why a proxy? The browser loads the portal from http://localhost:8081 but the
# gateway listens on :8080 — a cross-origin call would need CORS headers, which
# the gateway deliberately does not emit. By proxying /v1/* here, the browser
# only ever talks to the SAME origin (8081), so no CORS is involved. The portal
# JS uses relative /v1/ URLs.

server {
    listen 80;
    server_name _;

    # Static single-page portal.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Demo: never cache the static assets so edits to the portal are picked
        # up on a plain refresh (no stale app.js/style.css confusion).
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # Reverse-proxy the gateway API. `gateway` resolves via the compose network.
    #
    # Resolve the upstream at REQUEST time, not config-load time: nginx would
    # otherwise hard-fail ([emerg] host not found in upstream) and crash-loop if
    # the gateway container's DNS name isn't ready the instant nginx boots.
    # Using the Docker embedded resolver + a variable in proxy_pass defers the
    # lookup, so the portal starts regardless of gateway startup ordering.
    location /v1/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gateway_upstream http://gateway:8080;
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Stream SSE responses through unbuffered (future-proofing; the portal
        # uses non-streaming requests, but this keeps streaming usable too).
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
