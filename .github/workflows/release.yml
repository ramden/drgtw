name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: drgtw

jobs:
  docker-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # QEMU provides the emulation needed to build the linux/arm64 image on
      # the amd64 GitHub runner. Must run before buildx.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            # only stable releases (no -alpha/-rc suffix) move `latest`
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # Multi-arch build. The arm64 image is built under QEMU emulation on the
      # amd64 runner; a release build (rustc + ort's ONNX Runtime download) is
      # CPU-bound, so the arm64 leg can take significantly longer than amd64.
      # A single build-push-action invocation produces a multi-platform
      # manifest; shared GHA cache (mode=max) is keyed per-platform internally.
      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
